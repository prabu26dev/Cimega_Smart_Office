<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cimega Smart Office - Loading</title>
    <style>
        body {
            background: #050505;
            color: #00e5ff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .splash-loader {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(0, 229, 255, 0.1);
            border-top: 4px solid #00e5ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .glow-text {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.5; text-shadow: 0 0 5px #00e5ff; }
            to { opacity: 1; text-shadow: 0 0 20px #00e5ff; }
        }
    </style>
</head>
<body>
    <div class="splash-loader"></div>
    <div class="glow-text">CIMEGA SMART OFFICE</div>
    
    <script>
        // Redirect to login page
        setTimeout(() => {
            window.location.href = 'src/pages/login/login.html';
        }, 1500);
    </script>
</body>
</html>
