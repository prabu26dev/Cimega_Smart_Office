<!DOCTYPE html>
<html>
<body style="background:#020b18;color:#00e5ff;font-family:monospace;padding:20px">
<h3>PRELOAD BRIDGE TEST</h3>
<pre id="out"></pre>
<script>
  const out = document.getElementById('out');
  function log(msg) { out.textContent += msg + '\n'; console.log(msg); }

  log('=== CHECKING BRIDGE OBJECTS ===');
  log('window.cimegaConfig  : ' + (typeof window.cimegaConfig));
  log('window._appConfig    : ' + (typeof window._appConfig));
  log('window.cimegaAPI     : ' + (typeof window.cimegaAPI));
  log('window._fb           : ' + (typeof window._fb));

  if (window.cimegaConfig) {
    log('\n--- cimegaConfig.firebase ---');
    try {
      const f = window.cimegaConfig.firebase;
      log('  apiKey    : ' + (f?.apiKey ? f.apiKey.slice(0,8)+'...' : 'KOSONG/UNDEFINED'));
      log('  projectId : ' + (f?.projectId || 'KOSONG'));
      log('  authDomain: ' + (f?.authDomain || 'KOSONG'));
    } catch(e) { log('  ERROR: ' + e.message); }
  } else {
    log('\n❌ window.cimegaConfig TIDAK ADA!');
  }

  if (window._appConfig) {
    log('\n--- _appConfig ---');
    log('  apiKey    : ' + (window._appConfig.apiKey ? window._appConfig.apiKey.slice(0,8)+'...' : 'KOSONG'));
    log('  projectId : ' + (window._appConfig.projectId || 'KOSONG'));
  }
  
  log('\n=== DONE ===');
</script>
</body>
</html>
