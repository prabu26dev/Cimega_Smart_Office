<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BGM_IDLE</title>
  <style>body { margin:0; background:#000; }</style>
</head>
<body>
  <audio id="bgm" preload="auto"></audio>
  <script>
    var bgm = document.getElementById('bgm');
    window._bgm = bgm;

    // ── Web Audio API Analyzer ──
    var audioCtx = null;
    var analyser = null;
    var dataArray = null;

    function initAnalyzer() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var source = audioCtx.createMediaElementSource(bgm);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64; // Kecil saja untuk performa
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        updateVisualizer();
      } catch (e) { console.error('Analyzer error:', e); }
    }

    function updateVisualizer() {
      if (!analyser || bgm.paused) {
        requestAnimationFrame(updateVisualizer);
        return;
      }
      analyser.getByteFrequencyData(dataArray);
      
      // Ambil 5 titik frekuensi untuk 5 bar equalizer
      // Kita ambil indeks 1, 3, 5, 7, 9 (hindari 0/sub-bass yang sering flat)
      var v1 = dataArray[1] || 0;
      var v2 = dataArray[3] || 0;
      var v3 = dataArray[6] || 0;
      var v4 = dataArray[9] || 0;
      var v5 = dataArray[12] || 0;
      
      // Kirim data via title (throttled by browser title update frequency)
      // Format: BGM_FREQ_v1_v2_v3_v4_v5
      document.title = 'BGM_FREQ_' + v1 + '_' + v2 + '_' + v3 + '_' + v4 + '_' + v5;
      
      requestAnimationFrame(updateVisualizer);
    }

    // Lagu selesai diputar normal
    bgm.addEventListener('ended', function() {
      document.title = 'BGM_ENDED_' + Date.now();
    });

    // Error load/decode — HANYA dari src yang sedang aktif
    bgm.addEventListener('error', function() {
      // Pastikan src bukan kosong (bukan dari sisa reset sebelumnya)
      if (!bgm.src || bgm.src === window.location.href || bgm.src.endsWith('/bgm_player.html')) return;
      document.title = 'BGM_ERROR_' + Date.now();
    });

    // Dipanggil dari main.js via executeJavaScript
    window.playSong = function(fileUrl, volume) {
      // Pastikan AudioContext jalan (butuh trigger user gesture biasanya, 
      // tapi autoplay-policy: no-user-gesture-required membantu)
      initAnalyzer();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

      // Reset bersih
      bgm.pause();
      bgm.removeAttribute('src');
      bgm.load();

      bgm.volume = (typeof volume === 'number' && volume >= 0 && volume <= 1) ? volume : 0.8;
      bgm.src = fileUrl;

      // Tunggu browser siap sebelum play()
      bgm.addEventListener('canplay', function onReady() {
        bgm.removeEventListener('canplay', onReady);
        bgm.play().catch(function(err) {
          if (err.name !== 'NotAllowedError') {
            document.title = 'BGM_ERROR_' + Date.now();
          }
        });
      });

      bgm.load();
    };

    window.setVolume = function(v) {
      if (typeof v === 'number' && v >= 0 && v <= 1) bgm.volume = v;
    };

    window.isPaused = function() {
      return bgm.paused;
    };
  </script>
</body>
</html>
