<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <title>Dashboard Guru - Cimega Smart Office</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root{
      --cyan:#00e5ff; --blue:#0066ff; --purple:#aa55ff; --dark:#020b18; --dark2:#041428; 
      --card:rgba(4,20,45,0.95); --border:rgba(0,102,255,0.25); 
      --text:#e0f4ff; --muted:#5a8aaa; --success:#00ff88; --danger:#ff4466; 
      --sidebar:245px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Exo 2',sans-serif;background:var(--dark);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:13px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,102,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,102,255,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar);background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;z-index:10;box-shadow:2px 0 20px rgba(0,102,255,0.05);}
    .sidebar-header{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .sidebar-logo-text{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#fff;letter-spacing:1px;line-height:1.3}
    .sidebar-logo-text span{color:var(--cyan);display:block;font-size:10px}
    
    .user-card{background:rgba(0,102,255,0.05);border:1px solid rgba(0,102,255,0.15);padding:10px;margin:10px;border-radius:10px;text-align:center;}
    .user-name{font-size:13px;font-weight:600;color:#fff;margin-bottom:2px;}
    .user-role{font-size:11px;color:var(--cyan);font-weight:600;font-family:'Orbitron',sans-serif;}

    .sidebar-nav{flex:1;overflow-y:auto;padding:10px}
    .nav-section{font-size:10px;font-family:'Orbitron',sans-serif;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:10px 8px 4px}
    .nav-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;cursor:pointer;transition:all .2s;color:var(--muted);margin-bottom:2px}
    .nav-item:hover{background:rgba(0,102,255,0.07);color:var(--text)}
    .nav-item.active{background:rgba(0,102,255,0.15);color:var(--cyan);border:1px solid rgba(0,102,255,0.25)}
    
    .btn-logout{display:block;width:calc(100% - 20px);margin:10px;padding:10px;background:rgba(255,68,102,0.07);border:1px solid rgba(255,68,102,0.15);border-radius:8px;color:#ff8899;text-align:center;cursor:pointer;}

    /* MAIN */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}
    .topbar{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--dark2);display:flex;align-items:center;justify-content:space-between}
    .topbar-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:1px}
    .content{flex:1;overflow-y:auto;padding:20px}
    
    .guru-module-page{display:none;animation:fadein .3s ease}
    .guru-module-page.active{display:block}
    @keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* COMPONENTS REUSABLE BY JS MODULES */
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:20px;overflow:hidden;}
    .card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(0,102,255,0.02)}
    .card-title{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--cyan);font-weight:700}
    .card-body{padding:20px}
    .form-group{margin-bottom:15px}
    .form-label{display:block;font-size:11px;color:var(--cyan);margin-bottom:6px;font-weight:600;text-transform:uppercase}
    .form-control{width:100%;padding:10px;background:rgba(0,102,255,0.03);border:1px solid rgba(0,102,255,0.2);border-radius:8px;color:var(--text);font-family:'Exo 2',sans-serif; outline:none;}
    .form-control:focus{border-color:var(--cyan);background:rgba(0,102,255,0.08)}
    
    .btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn-primary{background:linear-gradient(135deg,#00aaff,#0066ff);color:#fff}
    .btn-primary:hover{box-shadow:0 0 15px rgba(0,102,255,0.4); transform:translateY(-1px);}

    /* UTILS USED BY MODULES */
    .ai-bubble{background:rgba(0,229,255,0.05); border:1px solid rgba(0,229,255,0.2); padding:15px; border-radius:12px;}
    .badge-subject{display:inline-block; padding:4px 8px; border-radius:4px; font-size:11px; background:rgba(170,85,255,0.1); color:var(--purple); border:1px solid rgba(170,85,255,0.2);}
    
    @media print {
      body * { visibility: hidden; }
      .sidebar, .topbar { display: none !important; }
      /* Modules can target print specifically */
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-text">CIMEGA <span>SMART OFFICE</span></div>
    </div>
    <div class="user-card" id="userCard">
      <div class="user-name" id="loginName">Memuat...</div>
      <div class="user-role">👩‍🏫 GURU KELAS / MAPEL</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Administrasi Mengajar</div>
      <div class="nav-item active" onclick="GuruUI.nav('perencanaan', this)">📑 Perencanaan (Modul)</div>
      <div class="nav-item" onclick="GuruUI.nav('pelaksanaan', this)">📝 Pelaksanaan (Jurnal)</div>
      <div class="nav-item" onclick="GuruUI.nav('asesmen', this)">💡 Asesmen (Bank Soal)</div>
      <div class="nav-item" onclick="GuruUI.nav('nilai', this)">📈 Pengolahan Nilai</div>
    </div>
    <button class="btn-logout" onclick="logout()">LOGOUT</button>
  </div>

  <!-- MAIN VIEW -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topTitle">PERENCANAAN PEMBELAJARAN (MODUL AJAR & P5)</div>
    </div>
    <div class="content">

      <!-- PAGE WRAPPERS AS REQUESTED -->
      <div id="page-perencanaan" class="guru-module-page active">
        <div id="modulAjarContainer"></div>  <!-- Target inject Perencanaan.js -->
      </div>
      
      <div id="page-pelaksanaan" class="guru-module-page">
        <div id="modulPelaksanaanContainer"></div> <!-- Target inject Pelaksanaan.js -->
      </div>

      <div id="page-asesmen" class="guru-module-page">
        <div id="modulAsesmenContainer"></div> <!-- Target inject Asesmen.js -->
      </div>

      <div id="page-nilai" class="guru-module-page">
        <div id="modulNilaiContainer"></div> <!-- Target inject Nilai.js -->
      </div>

    </div>
  </div>

  <!-- CORE UI NAVIGATION LOGIC -->
  <script>
    window.GuruUI = {
      nav: function(pageId, el) {
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.guru-module-page').forEach(e => e.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        
        const titles = {
          'perencanaan': 'PERENCANAAN PEMBELAJARAN (MODUL AJAR & P5)',
          'pelaksanaan': 'PELAKSANAAN (JURNAL & PRESENSI)',
          'asesmen': 'ASESMEN (BANK SOAL & HOTS)',
          'nilai': 'PENGOLAHAN NILAI & NARASI RAPOR'
        };
        document.getElementById('topTitle').innerText = titles[pageId];
      }
    };
    
    // Auth Check
    const userData = JSON.parse(localStorage.getItem('cimega_user') || '{}');
    if (!userData.roles || !userData.roles.includes('guru')) {
      window.location.href = '../login/login.html'; // Kick non-guru
    }
    document.getElementById('loginName').innerText = userData.nama || 'Guru';

    function logout() {
      localStorage.removeItem('cimega_user');
      window.location.href = '../login/login.html';
    }
  </script>

  <!-- FIREBASE & AI INITIALIZATION (MOCK/WRAPPER) -->
  <script>
    let db;
    async function initEnvironment() {
      try {
        const firebaseConfig = await window.cimegaAPI.getFirebaseConfig();
        const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
        const { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc, query, where, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        window._fb = { collection, addDoc, getDocs, updateDoc, doc, deleteDoc, query, where, serverTimestamp };
        
        // Modules usually self-initialize if detecting the page, but we ensure calling their boot if available
        if(window.ModulPerencanaan) window.ModulPerencanaan.init();
        if(window.ModulPelaksanaan) window.ModulPelaksanaan.init();
        if(window.ModulAsesmen) window.ModulAsesmen.init();
        if(window.ModulNilai) window.ModulNilai.init();

      } catch(e) {
        console.error("Environment init fail", e);
      }
    }
    initEnvironment();
  </script>

  <!-- SCRIPT INJECTIONS -->
  <script type="module" src="../../modules/guru/perencanaan.js"></script>
  <script type="module" src="../../modules/guru/pelaksanaan.js"></script>
  <script type="module" src="../../modules/guru/asesmen.js"></script>
  <script type="module" src="../../modules/guru/nilai.js"></script>

</body>
</html>
