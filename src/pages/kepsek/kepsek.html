<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <title>Executive Dashboard - Cimega Smart Office</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CDNs -->
  <link href="https://cdn.jsdelivr.net/npm/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gridjs/dist/gridjs.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root{
      --violet:#9d4edd; --violet-light:#c77dff; --cyan:#00e5ff; 
      --dark:#020b18; --dark2:#041428; 
      --card:rgba(15, 10, 30, 0.95); --border:rgba(157, 78, 221, 0.3); 
      --text:#e0f4ff; --muted:#7b6b93; --success:#00ff88; --danger:#ff4466; 
      --warn:#ffaa00; --sidebar:245px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Exo 2',sans-serif;background:var(--dark);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:13px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(157,78,221,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(157,78,221,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar);background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;z-index:10;box-shadow:2px 0 20px rgba(157,78,221,0.08);}
    .sidebar-header{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .sidebar-logo-text{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#fff;letter-spacing:1px;line-height:1.3}
    .sidebar-logo-text span{color:var(--violet-light);display:block;font-size:10px}
    
    .user-card{background:rgba(157,78,221,0.05);border:1px solid rgba(157,78,221,0.2);padding:10px;margin:10px;border-radius:10px;text-align:center;}
    .user-name{font-size:13px;font-weight:600;color:#fff;}
    .user-role{font-size:11px;color:var(--cyan);margin-top:4px;font-weight:600;font-family:'Orbitron',sans-serif; letter-spacing:1px;}

    .sidebar-nav{flex:1;overflow-y:auto;padding:10px}
    .nav-section{font-size:10px;font-family:'Orbitron',sans-serif;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:10px 8px 4px}
    .nav-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;cursor:pointer;transition:all .2s;color:var(--muted);margin-bottom:2px}
    .nav-item:hover{background:rgba(157,78,221,0.05);color:var(--text)}
    .nav-item.active{background:linear-gradient(90deg, rgba(157,78,221,0.2), transparent);color:var(--violet-light);border-left:3px solid var(--violet-light);}
    
    .btn-logout{display:block;width:calc(100% - 20px);margin:10px;padding:10px;background:rgba(255,68,102,0.07);border:1px solid rgba(255,68,102,0.15);border-radius:8px;color:#ff8899;text-align:center;cursor:pointer;}

    /* MAIN */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}
    .topbar{padding:14px 20px;border-bottom:1px solid var(--border);background:rgba(2, 11, 24, 0.8);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between}
    .topbar-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase;}
    .content{flex:1;overflow-y:auto;padding:20px}
    .page{display:none;animation:fadein .3s ease}
    .page.active{display:block}
    @keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* COMPONENTS */
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:20px;overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.5);}
    .card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(157,78,221,0.05)}
    .card-title{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--violet-light);font-weight:700}
    .card-body{padding:20px}
    
    .form-group{margin-bottom:15px}
    .form-label{display:block;font-size:11px;color:var(--violet-light);margin-bottom:6px;font-weight:600;text-transform:uppercase}
    .form-control{width:100%;padding:10px;background:rgba(157,78,221,0.03);border:1px solid rgba(157,78,221,0.2);border-radius:8px;color:var(--text);font-family:'Exo 2',sans-serif;}
    .form-control:focus{outline:none;border-color:var(--cyan);background:rgba(0,229,255,0.05)}
    
    .btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .btn-primary{background:linear-gradient(135deg,#7b2cbf,#9d4edd);color:#fff}
    .btn-primary:hover{box-shadow:0 0 15px rgba(157,78,221,0.4); transform:translateY(-1px);}
    .btn-success{background:rgba(0,255,136,0.15);color:var(--success);border:1px solid rgba(0,255,136,0.3)}
    .btn-ghost{background:rgba(157,78,221,0.08);color:var(--violet-light);border:1px solid rgba(157,78,221,0.2)}
    
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
    
    /* Loading Spinner */
    .spinner-glowing {
      width: 40px; height: 40px;
      border: 4px solid rgba(157,78,221,0.2);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 15px var(--cyan);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* GRID.js Overrides for Kepsek */
    .gridjs-container{color:var(--text);font-family:'Exo 2',sans-serif;}
    .gridjs-wrapper{background:transparent !important;border:none !important;box-shadow:none !important;}
    .gridjs-table{background:transparent !important;}
    .gridjs-th{background:rgba(157,78,221,0.08) !important;color:var(--violet-light) !important;border:1px solid rgba(157,78,221,0.2) !important;font-family:'Orbitron',sans-serif;font-size:11px;}
    .gridjs-td{background:transparent !important;color:var(--text) !important;border:1px solid rgba(157,78,221,0.05) !important;font-size:12px;}
    .gridjs-footer{background:rgba(157,78,221,0.03) !important;border:1px solid rgba(157,78,221,0.1) !important;}
    .gridjs-search-input{background:rgba(157,78,221,0.05);color:var(--text);border:1px solid rgba(157,78,221,0.3);border-radius:8px;}

  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-text">EXECUTIVE <span>SMART OFFICE</span></div>
    </div>
    <div class="user-card" id="userCard">
      <div class="user-name" id="loginName">Memuat...</div>
      <div class="user-role">👑 KEPALA SEKOLAH</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Dashboard & Analitik</div>
      <div class="nav-item active" onclick="KepsekUI.nav('dasbor', this)">📈 Eksekutif Dasbor</div>
      <div class="nav-section">Pengendalian Mutu</div>
      <div class="nav-item" onclick="KepsekUI.nav('supervisi', this)">🔍 Supervisi Akademik</div>
      <div class="nav-section">Otorisasi & Legalitas</div>
      <div class="nav-item" onclick="KepsekUI.nav('approval', this)">✒️ Persetujuan & TTE</div>
      <div class="nav-item" onclick="KepsekUI.nav('arsip', this)">🗃️ Arsip Makro</div>
    </div>
    <button class="btn-logout" onclick="logout()">LOGOUT</button>
  </div>

  <!-- MAIN VIEW -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topTitle">EKSEKUTIF DASBOR (REAL-TIME ANALYTICS)</div>
    </div>
    <div class="content">

      <div class="page active" id="page-dasbor"><div id="moduleDashboardApp"></div></div>
      <div class="page" id="page-supervisi"><div id="moduleSupervisiApp"></div></div>
      <div class="page" id="page-approval"><div id="moduleApprovalApp"></div></div>
      <div class="page" id="page-arsip"><div id="moduleArsipApp"></div></div>

    </div>
  </div>

  <!-- CORE LOGIC -->
  <script>
    window.formatIDR = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num || 0);

    window.KepsekUI = {
      nav: function(pageId, el) {
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        
        const titles = {
          'dasbor': 'EKSEKUTIF DASBOR (REAL-TIME ANALYTICS)',
          'supervisi': 'SUPERVISI AKADEMIK & AI EVALUATOR',
          'approval': 'SISTEM PERSETUJUAN & TTE (PIN)',
          'arsip': 'ARSIP MAKRO INSTITUSI (KOSP, RKT, RKJM)'
        };
        document.getElementById('topTitle').innerText = titles[pageId];
      }
    };
    
    // Auth Check
    const userData = JSON.parse(localStorage.getItem('cimega_user') || '{}');
    if (!userData.roles || !userData.roles.includes('kepsek')) {
      window.location.href = '../login/login.html';
    }
    document.getElementById('loginName').innerText = userData.nama || 'Kepala Sekolah';

    // Get PIN (Fallback '123456' for TTE)
    // TODO: Create a "Profile Options" module later where Principals can securely change their TTE PIN.
    window.kepsekPIN = userData.pin || '123456';

    function logout() {
      localStorage.removeItem('cimega_user');
      window.location.href = '../login/login.html';
    }
    
    let db;
    async function initFirestore() {
      try {
        const firebaseConfig = await window.cimegaAPI.getFirebaseConfig();
        const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
        const { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc, query, where, orderBy, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        window._fb = { collection, addDoc, getDocs, updateDoc, doc, deleteDoc, query, where, orderBy, serverTimestamp };
        
        // Boot Modules
        if(window.ModulDashboard) window.ModulDashboard.init();
        if(window.ModulSupervisi) window.ModulSupervisi.init();
        if(window.ModulApproval) window.ModulApproval.init();
        if(window.ModulArsipMakro) window.ModulArsipMakro.init();
      } catch(e) { console.error("Firebase init failed", e); }
    }
    
    initFirestore();
  </script>

  <!-- MODULE SCRIPTS -->
  <script src="../../modules/kepsek/dashboard.js"></script>
  <script src="../../modules/kepsek/supervisi.js"></script>
  <script src="../../modules/kepsek/approval.js"></script>
  <script src="../../modules/kepsek/arsip_makro.js"></script>
</body>
</html>
