<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <title>Operator Sekolah - Cimega Smart Office</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- UI LIBRARY: Grid.js -->
  <link href="https://cdn.jsdelivr.net/npm/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gridjs/dist/gridjs.umd.js"></script>

  <!-- Papaparse for CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    :root{--cyan:#00e5ff;--blue:#0066ff;--dark:#020b18;--dark2:#041428;--card:rgba(4,20,45,0.95);--border:rgba(0,229,255,0.15);--text:#e0f4ff;--muted:#5a8aaa;--success:#00ff88;--danger:#ff4466;--warn:#ffaa00;--gold:#ffd000;--sidebar:245px}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Exo 2',sans-serif;background:var(--dark);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:13px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar);background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;z-index:10}
    .sidebar-header{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .sidebar-logo-text{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#fff;letter-spacing:1px;line-height:1.3}
    .sidebar-logo-text span{color:var(--cyan);display:block;font-size:10px}
    .user-card{background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.1);padding:10px;margin:10px;border-radius:10px;text-align:center;}
    .user-name{font-size:13px;font-weight:600;color:#fff;}
    .user-role{font-size:11px;color:var(--warn);margin-top:4px;font-weight:600;}

    .sidebar-nav{flex:1;overflow-y:auto;padding:10px}
    .nav-section{font-size:10px;font-family:'Orbitron',sans-serif;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:10px 8px 4px}
    .nav-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;cursor:pointer;transition:all .2s;color:var(--muted);margin-bottom:2px}
    .nav-item:hover{background:rgba(0,229,255,0.07);color:var(--text)}
    .nav-item.active{background:rgba(0,229,255,0.12);color:var(--cyan);border:1px solid rgba(0,229,255,0.18)}
    
    .btn-logout{display:block;width:calc(100% - 20px);margin:10px;padding:10px;background:rgba(255,68,102,0.07);border:1px solid rgba(255,68,102,0.15);border-radius:8px;color:#ff8899;text-align:center;cursor:pointer;}

    /* MAIN */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}
    .topbar{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--dark2);display:flex;align-items:center;justify-content:space-between}
    .topbar-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:1px}
    .content{flex:1;overflow-y:auto;padding:20px}
    .page{display:none;animation:fadein .3s ease}
    .page.active{display:block}
    @keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* COMPONENTS */
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:20px;overflow:hidden;}
    .card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(0,229,255,0.02)}
    .card-title{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--cyan);font-weight:700}
    .card-body{padding:20px}
    .form-group{margin-bottom:15px}
    .form-label{display:block;font-size:11px;color:var(--cyan);margin-bottom:6px;font-weight:600;text-transform:uppercase}
    .form-control{width:100%;padding:10px;background:rgba(0,229,255,0.03);border:1px solid rgba(0,229,255,0.15);border-radius:8px;color:var(--text);font-family:'Exo 2',sans-serif;}
    .form-control:focus{outline:none;border-color:var(--cyan);background:rgba(0,229,255,0.08)}
    
    .btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
    .btn-primary{background:linear-gradient(135deg,#00aaff,#0066ff);color:#fff}
    .btn-success{background:rgba(0,255,136,0.15);color:var(--success);border:1px solid rgba(0,255,136,0.3)}
    .btn-ghost{background:rgba(0,229,255,0.08);color:var(--cyan);border:1px solid rgba(0,229,255,0.2)}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px}

    /* GRID.js Cimega Theme Overrides */
    .gridjs-container{color:var(--text);font-family:'Exo 2',sans-serif;}
    .gridjs-wrapper{background:transparent !important;border:none !important;box-shadow:none !important;}
    .gridjs-table{background:transparent !important;}
    .gridjs-th{background:rgba(0,229,255,0.05) !important;color:var(--cyan) !important;border:1px solid rgba(0,229,255,0.1) !important;font-family:'Orbitron',sans-serif;font-size:11px;}
    .gridjs-td{background:transparent !important;color:var(--text) !important;border:1px solid rgba(0,229,255,0.05) !important;font-size:12px;}
    .gridjs-tr:hover .gridjs-td{background:rgba(0,229,255,0.03) !important;}
    .gridjs-footer{background:rgba(0,229,255,0.02) !important;border:1px solid rgba(0,229,255,0.1) !important;box-shadow:none !important;}
    .gridjs-search-input{background:rgba(0,229,255,0.03);color:var(--text);border:1px solid rgba(0,229,255,0.15);border-radius:8px;}

    /* PRINT LAYOUT FOR E-OFFICE */
    @media print {
      body * { visibility: hidden; }
      .sidebar, .topbar, .btn { display: none !important; }
      #printableArea, #printableArea * { visibility: visible; }
      #printableArea {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        background: #fff;
        color: #000;
        padding: 2cm;
        font-family: 'Times New Roman', Times, serif;
      }
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-text">CIMEGA <span>SMART OFFICE</span></div>
    </div>
    <div class="user-card" id="userCard">
      <div class="user-name" id="loginName">Memuat...</div>
      <div class="user-role">💻 OPERATOR SEKOLAH</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Manajemen Data</div>
      <div class="nav-item active" onclick="OpsUI.nav('pd', this)">👥 Peserta Didik</div>
      <div class="nav-item" onclick="OpsUI.nav('ptk', this)">👨‍🏫 PTK & Staf</div>
      <div class="nav-item" onclick="OpsUI.nav('sarpras', this)">🏫 Sarana & Prasarana</div>
      <div class="nav-section">Administrasi</div>
      <div class="nav-item" onclick="OpsUI.nav('eoffice', this)">✉️ E-Office (AI)</div>
    </div>
    <button class="btn-logout" onclick="logout()">LOGOUT</button>
  </div>

  <!-- MAIN VIEW -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topTitle">MANAJEMEN PESERTA DIDIK</div>
    </div>
    <div class="content">

      <!-- PAGE: PESERTA DIDIK -->
      <div class="page active" id="page-pd">
        <div id="modulePesertaDidikApp"></div>
      </div>

      <!-- PAGE: PTK -->
      <div class="page" id="page-ptk">
        <div id="modulePtkApp"></div>
      </div>

      <!-- PAGE: SARPRAS -->
      <div class="page" id="page-sarpras">
        <div id="moduleSarprasApp"></div>
      </div>

      <!-- PAGE: E-OFFICE -->
      <div class="page" id="page-eoffice">
        <div id="moduleEOfficeApp"></div>
      </div>

    </div>
  </div>

  <!-- FIREBASE DEP & UTILS -->
  <script>
    window.OpsUI = {
      nav: function(pageId, el) {
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        
        const titles = {
          'pd': 'MANAJEMEN PESERTA DIDIK',
          'ptk': 'PENDIDIK & TENAGA KEPENDIDIKAN',
          'sarpras': 'SARANA & PRASARANA',
          'eoffice': 'E-OFFICE (SURAT AI)'
        };
        document.getElementById('topTitle').innerText = titles[pageId];
      }
    };
    
    const userData = JSON.parse(localStorage.getItem('cimega_user') || '{}');
    if (!userData.roles || !userData.roles.includes('ops')) {
      window.location.href = '../login/login.html';
    }
    document.getElementById('loginName').innerText = userData.nama || 'OPS';

    function logout() {
      localStorage.removeItem('cimega_user');
      window.location.href = '../login/login.html';
    }
    
    // Minimal Firebase initialization mirroring logic
    let db;
    async function initFirestore() {
      const firebaseConfig = await window.cimegaAPI.getFirebaseConfig();
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
      const { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc, query, where, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      window._fb = { collection, addDoc, getDocs, updateDoc, doc, deleteDoc, query, where, serverTimestamp };
      
      // Initialize Modules
      if(window.ModulPD) window.ModulPD.init();

      // Multi-Tenant SaaS Update: Secure Chat
      if(window.CimegaChat) window.CimegaChat.init(db);
      if(window.ModulPTK) window.ModulPTK.init();
      if(window.ModulSarpras) window.ModulSarpras.init();
      if(window.ModulEOffice) window.ModulEOffice.init();
    }
    
    initFirestore();
  </script>

  <!-- SHARED SaaS UPGRADE -->
  <script src="../../shared/crypto_helper.js"></script>
  <script src="../../shared/chat.js"></script>

  <!-- MODULE SCRIPTS -->
  <script src="../../modules/ops/peserta_didik.js"></script>
  <script src="../../modules/ops/ptk.js"></script>
  <script src="../../modules/ops/sarpras.js"></script>
  <script src="../../modules/ops/e_office.js"></script>
</body>
</html>
