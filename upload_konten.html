// ── Upload functions ──────────────────────
let cntDone=0, cntSkip=0, cntErr=0;

function log(cls, msg) {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function setProgress(done, total) {
  document.getElementById('progressFill').style.width = (done/total*100) + '%';
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent  = cntDone;
  document.getElementById('statSkip').textContent  = cntSkip;
  document.getElementById('statErr').textContent   = cntErr;
}

window.startUpload = async function(force=false) {
  document.getElementById('btnUpload').disabled = true;
  document.getElementById('log').innerHTML = '';
  cntDone=0; cntSkip=0; cntErr=0;
  log('info', `🚀 Memulai upload ${KONTEN.length} dokumen ke Firestore...`);
  log('muted', '─'.repeat(60));

  for (let i = 0; i < KONTEN.length; i++) {
    const item = KONTEN[i];
    try {
      if (!force) {
        // Cek apakah sudah ada
        const existing = await getDocs(query(
          collection(db,'konten'),
          where('kategori','==',item.kategori),
          where('nama','==',item.nama)
        ));
        if (!existing.empty) {
          log('warn', `⏭ SKIP: [${item.kategori}] ${item.nama}`);
          cntSkip++;
          setProgress(i+1, KONTEN.length);
          continue;
        }
      }
      await addDoc(collection(db,'konten'), {
        kategori:       item.kategori,
        kategoriLabel:  item.kategoriLabel,
        nama:           item.nama,
        template:       item.template,
        createdAt:      serverTimestamp(),
        createdBy:      'system-upload',
      });
      log('ok', `✅ OK: [${item.kategori}] ${item.nama}`);
      cntDone++;
    } catch(e) {
      log('err', `❌ ERROR: ${item.nama} — ${e.message}`);
      cntErr++;
    }
    setProgress(i+1, KONTEN.length);
    // Delay kecil agar tidak rate-limit
    await new Promise(r => setTimeout(r, 80));
  }

  log('muted', '─'.repeat(60));
  log('ok', `🎉 SELESAI! Berhasil: ${cntDone} | Skip: ${cntSkip} | Error: ${cntErr}`);
  document.getElementById('btnUpload').disabled = false;
  document.getElementById('btnReset').style.display = '';
};

window.resetKonten = async function() {
  if (!confirm('⚠ HAPUS semua konten lama dan upload ulang?\nIni akan menghapus semua template yang ada!')) return;
  document.getElementById('btnReset').disabled = true;
  log('warn', '🗑️ Menghapus semua konten lama...');
  try {
    const snap = await getDocs(collection(db,'konten'));
    let del = 0;
    for (const d of snap.docs) {
      await deleteDoc(doc(db,'konten',d.id));
      del++;
    }
    log('ok', `✅ ${del} dokumen lama dihapus`);
  } catch(e) { log('err','Gagal hapus: '+e.message); }
  cntDone=0; cntSkip=0; cntErr=0;
  await window.startUpload(true);
  document.getElementById('btnReset').disabled = false;
};
</script>
